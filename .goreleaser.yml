# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
version: 2
before:
  hooks:
    - go mod tidy
builds:
  - main: ./cmd/ix500
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    mod_timestamp: "{{ .CommitTimestamp }}"
archives:
  - format_overrides:
      - goos: windows
        formats: ["zip"]
report_sizes: true
